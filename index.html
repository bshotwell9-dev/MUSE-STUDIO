<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muse Studio: Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --glass: rgba(10, 12, 18, 0.75);
            --border: rgba(255, 255, 255, 0.1);
            --cyan: #06b6d4;
            --violet: #8b5cf6;
        }

        body {
            background: #050507 url('cover_vaporwave.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* The "Pro" Glassmorphism Effect */
        .studio-panel {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(210%);
            -webkit-backdrop-filter: blur(25px) saturate(210%);
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .neon-text {
            text-shadow: 0 0 12px rgba(6, 182, 212, 0.6);
        }

        .btn-studio {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-studio:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--cyan);
            transform: translateY(-2px);
        }

        /* GPU-Accelerated Playhead */
        .playhead {
            width: 2px;
            height: 100%;
            background: var(--cyan);
            box-shadow: 0 0 15px var(--cyan), 0 0 30px var(--cyan);
            will-change: transform;
            transform: translate3d(0, 0, 0);
            z-index: 50;
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 flex flex-col items-center">

    <header class="w-full max-w-5xl studio-panel rounded-3xl p-6 flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-black tracking-tighter text-cyan-400 neon-text">MUSE STUDIO <span class="text-white opacity-90 text-xl font-light">PRO</span></h1>
            <p class="text-[10px] uppercase tracking-[0.3em] text-slate-500 font-bold">Serverless DAW • High-Bitrate Engine</p>
        </div>
        <div class="flex gap-3">
            <button onclick="initStudio()" id="mainBtn" class="bg-cyan-600 hover:bg-cyan-500 text-black font-black px-8 py-3 rounded-xl transition-all uppercase text-sm shadow-lg shadow-cyan-900/40">
                Initialize Studio
            </button>
            <button id="perfBtn" class="btn-studio px-4 py-3 rounded-xl text-xs font-bold uppercase">Low CPU</button>
        </div>
    </header>

    <main class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-1 flex flex-col gap-6">
            <section class="studio-panel rounded-3xl p-6">
                <h2 class="text-xs font-black text-slate-500 tracking-widest mb-6 uppercase flex items-center gap-2">
                    <span class="w-2 h-2 bg-cyan-500 rounded-full shadow-[0_0_8px_#06b6d4]"></span> Voice Lab Pro
                </h2>
                <div class="space-y-3">
                    <button class="btn-studio w-full p-4 rounded-2xl text-left group">
                        <div class="text-cyan-400 font-bold group-hover:neon-text">Modern Lead</div>
                        <div class="text-[10px] text-slate-500 uppercase font-medium">Gate • Air EQ • Comp</div>
                    </button>
                    <button class="btn-studio w-full p-4 rounded-2xl text-left group">
                        <div class="text-violet-400 font-bold group-hover:neon-text italic">Cloud Rap</div>
                        <div class="text-[10px] text-slate-500 uppercase font-medium">Pitch Shift • Hall Reverb</div>
                    </button>
                    <button class="btn-studio w-full p-4 rounded-2xl text-left group">
                        <div class="text-emerald-400 font-bold group-hover:neon-text">Radio Star</div>
                        <div class="text-[10px] text-slate-500 uppercase font-medium">Bandpass • Soft Saturation</div>
                    </button>
                </div>
            </section>
        </div>

        <div class="lg:col-span-2">
            <section class="studio-panel rounded-3xl p-6 h-full flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xs font-black text-slate-500 tracking-widest uppercase">Timeline & Logic</h2>
                    <div id="status" class="text-[10px] mono text-cyan-700">LATENCY: --ms</div>
                </div>

                <div class="flex-grow bg-black/40 rounded-2xl relative overflow-hidden border border-white/5">
                    <div id="playhead" class="playhead absolute top-0 left-0"></div>
                    
                    <div class="absolute inset-0 flex items-center justify-around px-10">
                        <div class="w-1 h-24 bg-cyan-500/20 rounded-full animate-[pulse-slow_2s_infinite]"></div>
                        <div class="w-1 h-40 bg-violet-500/20 rounded-full animate-[pulse-slow_2.5s_infinite]"></div>
                        <div class="w-1 h-16 bg-cyan-500/20 rounded-full animate-[pulse-slow_1.8s_infinite]"></div>
                        <div class="w-1 h-32 bg-violet-500/20 rounded-full animate-[pulse-slow_3s_infinite]"></div>
                    </div>
                </div>

                <div class="mt-6 flex gap-4">
                    <div class="flex-grow h-12 bg-white/5 rounded-xl border border-white/5 flex items-center px-4">
                        <div class="w-full bg-slate-800 h-1 rounded-full overflow-hidden">
                            <div class="bg-cyan-500 h-full w-1/3"></div>
                        </div>
                    </div>
                    <button class="w-12 h-12 rounded-xl bg-red-600/20 border border-red-500/50 flex items-center justify-center">
                        <div class="w-3 h-3 bg-red-500 rounded-full shadow-[0_0_10px_red]"></div>
                    </button>
                </div>
            </section>
        </div>
    </main>

    <script>
        let started = false;

        async function initStudio() {
            if (started) return;
            
            await Tone.start();
            started = true;
            
            const btn = document.getElementById('mainBtn');
            btn.innerText = "Studio Active";
            btn.classList.replace('bg-cyan-600', 'bg-emerald-600');
            
            document.getElementById('status').innerText = `LATENCY: ${(Tone.context.lookAhead * 1000).toFixed(1)}ms`;
            
            startTimeline();
        }

        function startTimeline() {
            const ph = document.getElementById('playhead');
            const loopSeconds = 4;
            
            Tone.Transport.bpm.value = 140;
            Tone.Transport.start();

            function render() {
                // Ties UI movement to the precise Tone.js clock
                const progress = (Tone.Transport.seconds % loopSeconds) / loopSeconds;
                ph.style.transform = `translate3d(${progress * 840}%, 0, 0)`; 
                // Adjusted % for the specific width of the container
                requestAnimationFrame(render);
            }
            render();
        }
    </script>
</body>
</html>
